services:
  postgres:
    image: postgres:15
    container_name: aegisops-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aegisops-network

  redis:
    image: redis:7
    container_name: aegisops-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - aegisops-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: aegisops-backend
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    ports:
      - "8080:8080"
    networks:
      - aegisops-network

volumes:
  postgres_data:

networks:
  aegisops-network:
    driver: bridge
