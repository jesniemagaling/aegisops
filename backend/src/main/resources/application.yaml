spring:
  application:
    name: aegisops-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aegisops}
    username: ${DB_USER:aegisops}
    password: ${DB_PASS:aegisops}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 100
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

aegisops:
  jwt:
    secret: ${JWT_SECRET:aegisops-dev-secret-key-change-in-production-must-be-at-least-256-bits-long}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} %-5level [%X{requestId:-no-request}] [%X{method:--} %X{path:--}] %logger{36} --- %msg%n"
  level:
    com.aegisops: DEBUG
    org.hibernate.SQL: DEBUG
